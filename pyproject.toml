# uv workspace root — virtual workspace (no top-level package)
[tool.uv.workspace]
members = [
    "services/chat-api",
    "services/safety-gateway",
    "services/orchestrator",
    "services/ingestion-worker",
    "services/dosing-service",
    "services/eval-runner",
    "packages/shared-types",
    "packages/safety-policy",
    "packages/chemistry-tables",
    "packages/prompts",
    "packages/observability",
]

[tool.uv.sources]
shared-types     = { workspace = true }
safety-policy    = { workspace = true }
chemistry-tables = { workspace = true }
prompts          = { workspace = true }
ingestion-worker = { workspace = true }
dosing-service   = { workspace = true }
safety-gateway   = { workspace = true }
orchestrator     = { workspace = true }
observability    = { workspace = true }

# Dev tooling installed at the workspace root so `uv run pytest` works from here.
[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# importlib mode lets multiple service `tests/` dirs coexist without unique
# package names (no __init__.py needed in test dirs).
addopts = "--import-mode=importlib"
# Repo-level adversarial corpus lives in tests/safety; service tests live under
# each service. Pass an explicit path to scope a run (e.g. tests/safety).
testpaths = ["tests/safety"]
