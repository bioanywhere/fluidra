<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fluidra Pool Assistant — Implementation Blueprint (As-Built)</title>
  <style>
    :root { --fg:#0f172a; --muted:#64748b; --bg:#f8fafc; --card:#fff; --border:#e2e8f0; --accent:#1d4ed8; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
      font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    nav.top { position:sticky; top:0; z-index:10; background:#0f172a; color:#fff; padding:10px 16px;
      display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    nav.top b { margin-right:auto; }
    nav.top a { color:#fff; text-decoration:none; background:#1e293b; padding:6px 12px; border-radius:999px; font-size:14px; }
    nav.top a:hover { background:var(--accent); }
    main { max-width:900px; margin:0 auto; padding:24px 16px 80px; }
    .loading { color:var(--muted); padding:40px 0; }
    h1,h2,h3 { line-height:1.25; scroll-margin-top:64px; }
    h1 { font-size:1.9rem; border-bottom:2px solid var(--border); padding-bottom:.3em; }
    h2 { font-size:1.45rem; margin-top:2em; border-bottom:1px solid var(--border); padding-bottom:.3em; }
    h3 { font-size:1.15rem; margin-top:1.5em; }
    a { color:var(--accent); }
    code { background:#eef2f7; padding:.15em .4em; border-radius:4px; font-size:.88em;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    pre { background:#0f172a; color:#e2e8f0; padding:14px 16px; border-radius:10px; overflow:auto; }
    pre code { background:none; color:inherit; padding:0; }
    table { border-collapse:collapse; width:100%; margin:1em 0; display:block; overflow-x:auto; }
    th,td { border:1px solid var(--border); padding:8px 10px; text-align:left; vertical-align:top; }
    th { background:#f1f5f9; }
    blockquote { border-left:4px solid var(--accent); margin:1em 0; padding:.4em 1em; background:#eff6ff; color:#1e3a8a; border-radius:0 8px 8px 0; }
    .mermaid { position:relative; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin:1.2em 0; text-align:center; overflow:hidden; }
    .mz-vp { position:relative; overflow:hidden; touch-action:none; cursor:grab; }
    .mz-vp:active { cursor:grabbing; }
    .mz-pan { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
    .mz-pan svg { max-width:none !important; height:auto; display:block; }
    .mz-tools { position:absolute; top:8px; right:8px; z-index:3; display:flex; gap:4px; opacity:0; transition:opacity .15s; }
    .mermaid:hover .mz-tools, .mz-tools:focus-within, .mermaid.mz-fs .mz-tools { opacity:1; }
    .mz-tools button { width:30px; height:30px; padding:0; border:1px solid var(--border); border-radius:7px; background:#fff;
      color:var(--fg); font-size:15px; line-height:1; cursor:pointer; display:inline-flex; align-items:center;
      justify-content:center; box-shadow:0 1px 2px rgba(0,0,0,.06); }
    .mz-tools button:hover { background:#f1f5f9; }
    .mz-toast { position:absolute; top:10px; left:10px; z-index:3; background:var(--fg); color:#fff; font-size:12px;
      padding:4px 9px; border-radius:6px; opacity:0; transition:opacity .15s; pointer-events:none; }
    .mz-toast.show { opacity:1; }
    .mermaid.mz-fs { position:fixed; inset:0; z-index:1000; margin:0; border:0; border-radius:0; padding:0; background:var(--card); }
    .mermaid.mz-fs .mz-vp { width:100% !important; height:100% !important; }
    .toc { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin:0 0 28px; }
    .toc-title { font-weight:700; margin-bottom:8px; }
    .toc ul { list-style:none; margin:0; padding:0; columns:2; column-gap:28px; }
    @media (max-width:640px){ .toc ul { columns:1; } }
    .toc li { margin:3px 0; font-size:14px; break-inside:avoid; }
    .toc li.lvl3 { padding-left:16px; font-size:13px; }
    .toc a { color:var(--accent); text-decoration:none; }
    .toc a:hover { text-decoration:underline; }
    img { max-width:100%; }
    @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }
  </style>
</head>
<body>
  <nav class="top">
    <b>Fluidra Pool Assistant</b>
    <a href="/">💬 Chat</a>
    <a href="/requirements.html">📖 Requirement</a>
    <a href="/blueprint.html">📘 Blueprint</a>
    <a href="/docs">🧪 API</a>
    <a href="https://github.com/bioanywhere/fluidra" target="_blank" rel="noopener">🐙 Code</a>
  </nav>
  <main>
    <div id="content"><p class="loading">Loading blueprint…</p></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    (async function () {
      const el = document.getElementById("content");
      const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");

      // 1) Fetch markdown.
      let md;
      try {
        const res = await fetch("/Fluidra_Implementation_Blueprint.md", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        md = await res.text();
      } catch (e) {
        el.innerHTML = '<p class="loading">Could not fetch the blueprint (' +
          (e && e.message ? e.message : e) +
          '). Raw: <a href="/Fluidra_Implementation_Blueprint.md">markdown</a></p>';
        return;
      }

      // 2) Pull mermaid blocks OUT before marked runs (so marked never mangles
      //    the diagram source), leaving a plain-text placeholder.
      const diagrams = [];
      md = md.replace(/```mermaid\s*\n([\s\S]*?)```/g, (_m, code) => {
        diagrams.push(code.trim());
        return `\n\nMERMAIDBLOCK${diagrams.length - 1}END\n\n`;
      });

      // 3) Render prose; then swap placeholders for escaped .mermaid divs.
      let html;
      try { html = marked.parse(md); }
      catch (_e) { html = "<pre>" + esc(md) + "</pre>"; }
      html = html.replace(/<p>\s*MERMAIDBLOCK(\d+)END\s*<\/p>/g,
        (_m, i) => `<div class="mermaid">${esc(diagrams[i])}</div>`);
      html = html.replace(/MERMAIDBLOCK(\d+)END/g,
        (_m, i) => `<div class="mermaid">${esc(diagrams[i])}</div>`);
      el.innerHTML = html;

      // 4) Build a table of contents from h2/h3.
      const heads = el.querySelectorAll("h2, h3");
      if (heads.length) {
        const seen = {};
        const items = [];
        heads.forEach((h) => {
          let id = slug(h.textContent) || "section";
          if (seen[id] != null) { seen[id]++; id = id + "-" + seen[id]; } else seen[id] = 0;
          h.id = id;
          items.push('<li class="' + (h.tagName === "H3" ? "lvl3" : "lvl2") +
            '"><a href="#' + id + '">' + h.textContent + "</a></li>");
        });
        const toc = document.createElement("nav");
        toc.className = "toc";
        toc.innerHTML = '<div class="toc-title">Contents</div><ul>' + items.join("") + "</ul>";
        el.insertBefore(toc, el.firstChild);
      }

      // 5) Capture each diagram's source (for the "copy" action), then render best-effort.
      el.querySelectorAll(".mermaid").forEach((d) => { d.dataset.src = (d.textContent || "").trim(); });
      try {
        if (window.mermaid) {
          mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose", suppressErrorRendering: true });
          await mermaid.run({ querySelector: ".mermaid" });
        }
      } catch (e) { console.warn("mermaid render issue (prose unaffected):", e); }

      // 6) GitHub-style in-place zoom/pan: each diagram stays in its light
      //    card with a hover toolbar (zoom out/in, reset, copy, fullscreen).
      //    No dark overlay — the background stays consistent while zooming.
      (function enableDiagramZoom() {
        const blocks = [...el.querySelectorAll(".mermaid")].filter((d) => d.querySelector("svg"));
        if (!blocks.length) return;
        const controllers = [];

        blocks.forEach((d) => {
          const svg = d.querySelector("svg");
          const vb = svg.viewBox && svg.viewBox.baseVal;
          const baseW = (vb && vb.width) || svg.getBoundingClientRect().width || 800;
          const baseH = (vb && vb.height) || svg.getBoundingClientRect().height || 600;
          svg.style.maxWidth = "none"; svg.style.width = baseW + "px"; svg.style.height = baseH + "px";

          const vp = document.createElement("div"); vp.className = "mz-vp";
          const pan = document.createElement("div"); pan.className = "mz-pan";
          pan.appendChild(svg); vp.appendChild(pan); d.insertBefore(vp, d.firstChild);

          const tools = document.createElement("div"); tools.className = "mz-tools";
          tools.innerHTML =
            '<button type="button" data-act="out"   title="Zoom out"    aria-label="Zoom out">−</button>' +
            '<button type="button" data-act="in"    title="Zoom in"     aria-label="Zoom in">+</button>' +
            '<button type="button" data-act="reset" title="Reset zoom"  aria-label="Reset zoom">⟲</button>' +
            '<button type="button" data-act="copy"  title="Copy source" aria-label="Copy diagram source">⧉</button>' +
            '<button type="button" data-act="fs"    title="Fullscreen"  aria-label="Toggle fullscreen">⛶</button>';
          d.appendChild(tools);
          const toast = document.createElement("div"); toast.className = "mz-toast"; d.appendChild(toast);

          let scale = 1, fit = 1, tx = 0, ty = 0;
          const isFs = () => d.classList.contains("mz-fs");
          const apply = () => { pan.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; };
          function clampPan() {
            const vw = vp.clientWidth, vh = vp.clientHeight, sw = baseW * scale, sh = baseH * scale;
            tx = sw <= vw ? (vw - sw) / 2 : Math.min(0, Math.max(vw - sw, tx));
            ty = sh <= vh ? (vh - sh) / 2 : Math.min(0, Math.max(vh - sh, ty));
          }
          function refit(reset) {
            if (isFs()) { vp.style.height = ""; }
            else { const vw0 = vp.clientWidth || baseW; fit = Math.min(1, vw0 / baseW); vp.style.height = baseH * fit + "px"; }
            const vw = vp.clientWidth || baseW, vh = vp.clientHeight || baseH * fit;
            if (isFs()) fit = Math.min(vw / baseW, vh / baseH);
            if (reset || scale < fit) scale = fit;
            clampPan(); apply();
          }
          function zoomAt(cx, cy, f) {
            const ns = Math.max(fit, Math.min(fit * 12, scale * f));
            tx = cx - (cx - tx) * (ns / scale); ty = cy - (cy - ty) * (ns / scale);
            scale = ns; clampPan(); apply();
          }
          function toggleFs() {
            const entering = !isFs();
            d.classList.toggle("mz-fs", entering);
            document.body.style.overflow = entering ? "hidden" : "";
            refit(true);
          }
          function showToast(t) {
            toast.textContent = t; toast.classList.add("show");
            clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove("show"), 1200);
          }
          async function copySrc() {
            try { await navigator.clipboard.writeText(d.dataset.src || ""); showToast("Source copied"); }
            catch (_e) { showToast("Copy failed"); }
          }

          tools.addEventListener("click", (e) => {
            const b = e.target.closest("button"); if (!b) return;
            const cx = vp.clientWidth / 2, cy = vp.clientHeight / 2, a = b.dataset.act;
            if (a === "in") zoomAt(cx, cy, 1.25);
            else if (a === "out") zoomAt(cx, cy, 0.8);
            else if (a === "reset") refit(true);
            else if (a === "copy") copySrc();
            else if (a === "fs") toggleFs();
          });
          vp.addEventListener("wheel", (e) => {
            if (!isFs() && !e.ctrlKey && !e.metaKey) return;   // let the page scroll otherwise
            e.preventDefault();
            const r = vp.getBoundingClientRect();
            zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.12 : 1 / 1.12);
          }, { passive: false });
          let drag = false, sx = 0, sy = 0;
          vp.addEventListener("pointerdown", (e) => { drag = true; sx = e.clientX; sy = e.clientY; vp.setPointerCapture(e.pointerId); });
          vp.addEventListener("pointermove", (e) => { if (!drag) return; tx += e.clientX - sx; ty += e.clientY - sy; sx = e.clientX; sy = e.clientY; clampPan(); apply(); });
          vp.addEventListener("pointerup", () => { drag = false; });

          refit(true);
          controllers.push({ vp, isFs, zoomAt, refit, toggleFs });
        });

        document.addEventListener("keydown", (e) => {
          const c = controllers.find((c) => c.isFs());
          if (!c) return;                                    // only act when a diagram is fullscreen
          const cx = c.vp.clientWidth / 2, cy = c.vp.clientHeight / 2;
          if (e.key === "Escape") c.toggleFs();
          else if (e.key === "+" || e.key === "=") { e.preventDefault(); c.zoomAt(cx, cy, 1.25); }
          else if (e.key === "-") { e.preventDefault(); c.zoomAt(cx, cy, 0.8); }
          else if (e.key === "0") { e.preventDefault(); c.refit(true); }
        });
        window.addEventListener("resize", () => controllers.forEach((c) => c.refit(true)));
      })();
    })();
  </script>
</body>
</html>
