[alembic]
# %(here)s expands to the directory containing this file (services/chat-api/),
# so migrations are found at services/chat-api/migrations/ regardless of CWD.
script_location = %(here)s/migrations
prepend_sys_path = %(here)s

# Overridden at runtime by migrations/env.py reading DATABASE_URL_SYNC from env.
sqlalchemy.url = postgresql://postgres:localdev@localhost:5432/assistant

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
