[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "observability"
version = "0.1.0"
requires-python = ">=3.12"
description = "Shared OpenTelemetry tracing, structured logging, and trace helpers (blueprint §9.2)."
dependencies = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "python-json-logger>=2.0.7",
]

# Real exporters are optional + imported lazily so local/CI run with no backend.
[project.optional-dependencies]
gcp = ["opentelemetry-exporter-gcp-trace>=1.6.0"]
otlp = ["opentelemetry-exporter-otlp-proto-grpc>=1.20"]
langfuse = ["langfuse>=2.0"]

[dependency-groups]
dev = ["pytest>=8.2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/observability"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
testpaths = ["tests"]
