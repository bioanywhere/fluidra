[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "safety-policy"
version = "2025.06.0"
requires-python = ">=3.12"
description = "Versioned safety patterns, block lists, and disclaimer strings. Changes require legal review."
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/safety_policy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
