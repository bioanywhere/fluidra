[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prompts"
version = "2025.06.0"
requires-python = ">=3.12"
description = "Versioned prompt templates + system personas. A prompt change is a reviewable, eval-gated diff."
dependencies = ["pyyaml>=6.0"]

[project.optional-dependencies]
dev = ["pytest>=8.2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/prompts"]
# Ship the prompt text + registry alongside the package code.
artifacts = ["*.md", "*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
